<!DOCTYPE html>
<!--
  ============================================================================
  TRIVIA HOST TIMER  —  no build tools, no dependencies.
  Built for Chicago Style Trivia (Revolution Entertainment) hosting.
  v2.10

  Three files: index.html (structure), style.css, app.js. Keep all three
  together in the repo root.

  DEPLOY TO GITHUB PAGES
  ----------------------
  1. Put index.html, style.css, and app.js in a repo (root, or same folder).
  2. Push to the `main` branch.
  3. On GitHub: Settings -> Pages -> Build and deployment
       Source:  Deploy from a branch
       Branch:  main   /  (root)
  4. Save. Your app will be live at:
       https://<your-username>.github.io/<repo-name>/
  (No CDN, no npm, no bundler — just the three static files.)

  NOTE: The Wake Lock API only works over HTTPS (GitHub Pages is HTTPS) or
  on localhost. It silently no-ops elsewhere; everything else still works.
  ============================================================================
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<title>Trivia Host Timer</title>
<link rel="icon" href="favicon.svg?v=2.10" type="image/svg+xml">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=2.10">
<link rel="manifest" href="manifest.json?v=2.10">
<meta name="theme-color" content="#0c0e11">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Trivia Timer">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- ============ HEADER ============ -->
  <header>
    <div class="apptitle">Trivia Timer</div>
    <div class="toplinks">
      <button class="linkbtn" id="summaryBtn">Summary</button>
      <button class="linkbtn" id="clearBtn">Clear Session</button>
    </div>
    <button class="iconbtn" id="gear" aria-label="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
    </button>
  </header>

  <!-- ============ TIMER ZONES ============ -->
  <div id="timers">
   <div id="layout">

    <div id="colMain">
      <hr class="div">

      <!-- ROUND TIMER -->
      <section id="zoneRound">
        <div class="timepair">
          <div class="tcol">
            <div class="tlabel">Current Round</div>
            <div class="bigtime" id="roundTime">00:00</div>
          </div>
          <div class="tcol">
            <div class="tlabel">Session</div>
            <div class="bigtime sess" id="gameTime">00:00</div>
          </div>
        </div>
        <div class="grid2">
          <button class="primary" id="runBtn">Start</button>
          <button id="stopBtn">End Round &amp; Log</button>
        </div>
        <button id="resetBtn" style="width:100%;margin-top:6px;">Reset</button>
      </section>

      <hr class="div">

      <!-- QUESTION COUNTDOWN -->
      <section id="zoneQuestion">
        <p class="zlabel">Question Countdown</p>
        <div class="midtime qtime" id="qTime">03:00</div>
        <div class="crow q">
          <button class="toggle" id="qToggle">5:00</button>
          <input type="number" id="qMin" min="1" max="5" step="1" value="3" aria-label="Question minutes">
          <button class="primary" id="qStart">Start</button>
          <button id="qReset">Reset</button>
        </div>
      </section>

      <!-- BREAK TIMER -->
      <section id="zoneBreak">
        <hr class="div">
        <p class="zlabel">Break Timer</p>
        <div class="midtime" id="bTime">10:00</div>
        <div class="crow b">
          <input type="number" id="bMin" min="1" max="60" step="1" value="10" aria-label="Break minutes">
          <button class="primary" id="bStart">Start Break</button>
          <button id="bReset">Reset</button>
        </div>
      </section>
    </div>

    <!-- ROUND LOG -->
    <div id="colLog">
      <hr class="div">
      <section>
        <p class="zlabel">Round Log</p>
        <div class="logwrap" id="log"></div>
      </section>
    </div>

   </div>
  </div>

  <!-- ============ SUMMARY PANEL ============ -->
  <div id="summary"></div>

</div>

<!-- ============ SETTINGS MODAL ============ -->
<div class="modal-back" id="settingsBack" role="dialog" aria-modal="true" aria-label="Settings">
  <div class="modal">
    <div class="modalhead">
      <span class="modaltitle">Settings</span>
      <button class="iconbtn" id="settingsClose" aria-label="Close settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
             stroke-linecap="round" aria-hidden="true">
          <path d="M6 6l12 12M18 6L6 18"></path>
        </svg>
      </button>
    </div>

    <div class="setrow">
      <div>
        <div class="setlabel">Appearance</div>
        <div class="setsub" id="themeSub">Dark mode</div>
      </div>
      <label class="sw-label" aria-label="Toggle light mode">
        <input type="checkbox" id="themeToggle">
        <span class="sw-track"><span class="sw-thumb"></span></span>
      </label>
    </div>

    <div class="setrow">
      <div>
        <div class="setlabel">Color-blind palette</div>
        <div class="setsub" id="cbSub">Off</div>
      </div>
      <label class="sw-label" aria-label="Toggle color-blind friendly palette">
        <input type="checkbox" id="cbToggle">
        <span class="sw-track"><span class="sw-thumb"></span></span>
      </label>
    </div>

    <div class="setrow col">
      <div class="setlabel">Text size <small id="fsVal">100%</small></div>
      <input type="range" id="fsRange" min="0.8" max="1.4" step="0.05" value="1" aria-label="Text size">
      <div class="setmini"><span class="s">A</span><span class="l">A</span></div>
      <button id="fsReset">Reset text size</button>
    </div>

    <div class="setver">Trivia Host Timer v2.10 &middot; built with Claude AI</div>
  </div>
</div>

<!-- ============ ROUND DETAIL MODAL ============
     On phone widths the log column is too narrow for the notes field, so
     tapping a logged round opens this instead. -->
<div class="modal-back" id="roundBack" role="dialog" aria-modal="true" aria-label="Round details">
  <div class="modal">
    <div class="modalhead">
      <span class="modaltitle" id="roundModalTitle">Round</span>
      <button class="iconbtn" id="roundClose" aria-label="Close round details">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
             stroke-linecap="round" aria-hidden="true">
          <path d="M6 6l12 12M18 6L6 18"></path>
        </svg>
      </button>
    </div>
    <div class="sumtotal" id="roundModalTime">00:00</div>
    <div style="text-align:center;margin:2px 0 14px;"><span class="badge" id="roundModalBadge"></span></div>
    <textarea id="roundModalNotes" placeholder="notes (e.g. beer round)…" aria-label="Round notes"></textarea>
  </div>
</div>

<script src="app.js" defer></script>
</body>
</html>
